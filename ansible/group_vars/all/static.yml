---
# =============================================================================
# Authentication
# =============================================================================
ansible_user: "ansible"

# =============================================================================
# Architecture
# =============================================================================
arch: "amd64"

# =============================================================================
# Component Versions
# =============================================================================
cni_version: "v1.9.0"
containerd_version: "2.2.1"
crictl_version: "v1.35.0"
etcd_version: "v3.6.8"
k8s_version: "v1.35.1"
runc_version: "v1.4.0"

# ====================================================
# KUBERNETES BINARIES
# ====================================================

k8s_base_url: "https://dl.k8s.io/{{ k8s_version }}/bin/linux/{{ arch }}"
k8s_download_dest: "/opt/kubernetes/bin"
k8s_binary_dest: "/usr/local/bin"

k8s_binaries:
  controller:
    - kube-apiserver
    - kube-controller-manager
    - kube-scheduler
    - kubectl
  worker:
    - kubelet
    - kube-proxy
    - kubectl
  client:
    - kubectl

# Checksums (SHA256)
k8s_checksums:
  kubectl: "sha256:36e2f4ac66259232341dd7866952d64a958846470f6a9a6a813b9117bd965207"
  kube-apiserver: "sha256:74671d5b9a0965120c0d9e35611f1555a3e795545238363c69b46765ee22b10c"
  kube-controller-manager: "sha256:d78b097ec3f21cce5c2b09cd14fab0ae3a446287ac5caa1734245f80c86fd400"
  kube-scheduler: "sha256:0b818ca2daf47c7e712534e7118ec4f3675fd4a9259822fb7756266c89378acd"
  kube-proxy: "sha256:1839e36d4d52a67c6dc370f3466a42925226e7073464d57caf5f7b83825cc59a"
  kubelet: "sha256:e7343310e03ff0d424df4397bdfa4468947d6d1f0f93dac586c1e8d6e4086d5d"

# ====================================================
# EXTERNAL DEPENDENCIES 
# ====================================================

downloads:
  etcd:
    url: "https://github.com/etcd-io/etcd/releases/download/{{ etcd_version }}/etcd-{{ etcd_version }}-linux-{{ arch }}.tar.gz"
    checksum: "sha256:cf9cfe91a4856cb90eed9c99e6aee4b708db2c7888b88a6f116281f04b0ea693"
    dest: "/opt"
    mode: "0644"
  containerd:
    url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-{{ arch }}.tar.gz"
    tarball_name: "containerd-{{ containerd_version }}-linux-{{ arch }}.tar.gz"
    checksum: "sha256:f5d8e90ecb6c1c7e33ecddf8cc268a93b9e5b54e0e850320d765511d76624f41"
    tarball_dest: "/opt/containerd/bin"
    mode: "0644"
  cni_plugins:
    url: "https://github.com/containernetworking/plugins/releases/download/{{ cni_version }}/cni-plugins-linux-{{ arch }}-{{ cni_version }}.tgz"
    tarball_name: "cni-plugins-linux-{{ arch }}-{{ cni_version }}.tgz"
    checksum: "sha256:58c03705426e929658f45a851df15a86d06ef680cacbf3f2dc127731ca265c28"
    tarball_dest: "/opt/cni/bin"
    execs_dest: "/opt/cni/bin"
    mode: "0644"
  crictl:
    url: "https://github.com/kubernetes-sigs/cri-tools/releases/download/{{ crictl_version }}/crictl-{{ crictl_version }}-linux-{{ arch }}.tar.gz"
    tarball_name: "crictl-{{ crictl_version }}-linux-{{ arch }}.tar.gz"
    checksum: "sha256:2e141e5b22cb189c40365a11807d69b76b9b3caced89fac2f4ec879408ce2177"
    tarball_dest: "/opt/crictl/bin"
    mode: "0644"
  runc:
    url: "https://github.com/opencontainers/runc/releases/download/{{ runc_version }}/runc.{{ arch }}"
    name: "runc.{{ arch }}"
    checksum: "sha256:c5d4995c5aec204d7e1827d9d9a6b45042602736f7f415f484252e576dcdac28"
    tarball_dest: "/opt/runc/bin"
    mode: "0755"

# ====================================================
# 
# ====================================================

pki_directory: "../pki"
kubeconfig_directory: "../kubeconfigs"
certs_worker_dest: "/var/lib/kubelet"

# The key used by the API Server for at rest encryption. The key is used for communication with the etcd instance.
crtl_key_dest: "/var/lib/kubernetes"

# PKI and Kubeconfig Configuration
k8s_components:
  admin:
    cert_name: "admin"
    cert_final_path: "/var/lib/kubernetes"
    vault_role: "kubernetes-admin"
    cn: "kubernetes-super-admin"
    kubeconfig_user: "admin"
    gen_kubeconfig: true
    kubeconfig_server: "https://k8s-ctrl-1.kubernetes.local:6443" 
  kube-apiserver:
    cert_name: "kube-apiserver"
    vault_role: "kubernetes-api-server"
    cn: "kubernetes"
    gen_kubeconfig: false
    kubeconfig_server: "https://k8s-ctrl-1.kubernetes.local:6443"
    san_dns: 
      - "kubernetes"
      - "kubernetes.default"
      - "kubernetes.default.svc"
      - "kubernetes.default.svc.cluster"
      - "kubernetes.svc.cluster.local"
      - "api-k8s-ctrl-1.kubernetes.local"
      - "k8s-ctrl-1.kubernetes.local"
      - "localhost"
    san_ips: 
      - "10.32.0.1"
      - "127.0.0.1"
      - "10.0.0.1"
  etcd:
    cert_name: "etcd"
    vault_role: "kubernetes-etcd"
    cn: "etcd"
    gen_kubeconfig: false
    san_dns: 
      - "etcd"
      - "k8s-etcd-1.kubernetes.local"
      - "kubernetes"
      - "k8s-ctrl-1.kubernetes.local"
      - "localhost"
    san_ips: 
      - "10.32.0.1"
      - "127.0.0.1"
      - "10.0.0.1"
  controller-manager:
    cert_name: "controller-manager"
    vault_role: "kubernetes-kube-controller-manager"
    cn: "system:kube-controller-manager"
    kubeconfig_user: "system:kube-controller-manager"
    gen_kubeconfig: true
    kubeconfig_server: "https://k8s-ctrl-1.kubernetes.local:6443"
    san_dns: 
      - "kube-controller-manager"
    san_ips: 
      - "127.0.0.1"
  scheduler:
    cert_name: "scheduler"
    vault_role: "kubernetes-kube-scheduler"
    cn: "system:kube-scheduler"
    kubeconfig_user: "system:kube-scheduler"
    gen_kubeconfig: true
    kubeconfig_server: "https://k8s-ctrl-1.kubernetes.local:6443"
    san_dns: 
      - "kube-scheduler"
    san_ips: 
      - "127.0.0.1"
  kube-proxy:
    cert_name: "kube-proxy"
    vault_role: "kubernetes-kube-proxy"
    cn: "system:kube-proxy"
    kubeconfig_user: "system:kube-proxy"
    gen_kubeconfig: true
    kubeconfig_server: "https://k8s-ctrl-1.kubernetes.local:6443"
    san_dns: 
      - "kube-proxy"
    san_ips: 
      - "127.0.0.1"
  service-accounts:
    cert_name: "service-accounts"
    vault_role: "kubernetes-service-accounts"
    cn: "service-accounts"
    gen_kubeconfig: false

worker_k8s_component:
  vault_role: "kubernetes-worker"
  cert_final_path: "/var/lib/kubernetes"
  cn_tmp: "system:node:"
  san_ips: "127.0.0.1"
  dest_dir_suffix: "workers"
  kubeconfig_server: "https://k8s-ctrl-1.kubernetes.local:6443"
