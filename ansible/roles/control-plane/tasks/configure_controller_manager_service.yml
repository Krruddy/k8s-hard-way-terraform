- name: Create API Server Data Directory
  ansible.builtin.file:
    path: "/var/lib/kubernetes"
    state: directory
    force: true
    #mode: '0700' # Commented out because no restrictions are provided in the guide

- name: Copy Kubeconfig for Controller Manager
  ansible.builtin.copy:
    src: "{{ kubeconfig_directory }}/controller-manager.kubeconfig"
    dest: "/var/lib/kubernetes/controller-manager.kubeconfig"

- name: Configure Controller Manager Systemd Service
  ansible.builtin.template:
    src: kube-controller-manager.service.j2
    dest: /etc/systemd/system/kube-controller-manager.service
    mode: '0644'

- name: Enable and Start Controller Manager Service
  ansible.builtin.systemd:
    name: kube-controller-manager
    state: started
    enabled: true
    daemon_reload: true
