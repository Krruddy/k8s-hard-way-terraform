- name: Create Kubernetes Proxy Data Directory
  ansible.builtin.file:
    path: "/var/lib/kube-proxy"
    state: directory
    mode: '0755'
    force: true

- name: Copy Kubeconfig for Proxy
  ansible.builtin.copy:
    src: "{{ kubeconfig_directory }}/kube-proxy.kubeconfig"
    dest: "/var/lib/kube-proxy/kube-proxy.kubeconfig"

- name: Configure Kubernetes Proxy Systemd Service
  ansible.builtin.template:
    src: kube-proxy.service.j2
    dest: /etc/systemd/system/kube-proxy.service
    mode: '0644'

- name: Copy Kubernetes Proxy Configuration File
  ansible.builtin.template:
    src: kube-proxy-config.yaml.j2
    dest: "/var/lib/kube-proxy/kube-proxy-config.yaml"
    mode: '0644'

- name: Enable and Start Kubernetes Proxy Service
  ansible.builtin.systemd:
    name: kube-proxy
    state: started
    enabled: true
    daemon_reload: true
